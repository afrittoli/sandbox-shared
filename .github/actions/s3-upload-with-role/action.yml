name: 'S3 Upload with IAM Role'
description: 'Configure AWS credentials via OIDC and upload a file to S3 with prefix scoping'

inputs:
  iam-role:
    description: 'IAM role ARN to assume via OIDC'
    required: true
  bucket-name:
    description: 'S3 bucket name'
    required: true
  storage-prefix:
    description: 'S3 prefix for this platform'
    required: true
  file-path:
    description: 'Path to the file to upload'
    required: true
  s3-key:
    description: 'S3 object key (filename in S3)'
    required: true
  aws-region:
    description: 'AWS region'
    required: false
    default: 'us-east-1'

runs:
  using: 'composite'
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.iam-role }}
        aws-region: ${{ inputs.aws-region }}
        audience: sts.amazonaws.com

    - name: Upload file to S3
      shell: bash
      run: |
        aws s3 cp "${{ inputs.file-path }}" \
          "s3://${{ inputs.bucket-name }}/${{ inputs.storage-prefix }}/${{ inputs.s3-key }}"

    - name: Verify upload
      shell: bash
      run: |
        echo "=== Listing objects under s3://${{ inputs.bucket-name }}/${{ inputs.storage-prefix }}/ ==="
        aws s3 ls "s3://${{ inputs.bucket-name }}/${{ inputs.storage-prefix }}/"
