name: Shared Build and Upload

on:
  workflow_call:
    inputs:
      iam-role:
        description: 'ARN of the IAM role to assume via OIDC'
        required: true
        type: string
      storage-prefix:
        description: 'S3 prefix for this platform (e.g., platform1)'
        required: true
        type: string
      bucket-name:
        description: 'S3 bucket name'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout shared repo
        uses: actions/checkout@v4

      - name: Create test artifact
        run: |
          cat > test-artifact.txt <<EOF
          === Test Artifact ===
          Repository: ${{ github.repository }}
          Workflow Run ID: ${{ github.run_id }}
          Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          Caller Workflow: ${{ github.workflow }}
          Job Workflow Ref: ${{ github.job_workflow_ref }}
          Actor: ${{ github.actor }}
          Event: ${{ github.event_name }}
          Ref: ${{ github.ref }}
          SHA: ${{ github.sha }}
          Run Attempt: ${{ github.run_attempt }}
          Storage Prefix: ${{ inputs.storage-prefix }}
          IAM Role: ${{ inputs.iam-role }}
          EOF
          echo "--- Artifact contents ---"
          cat test-artifact.txt

      - name: Upload to S3
        uses: ./.github/actions/s3-upload-with-role
        with:
          iam-role: ${{ inputs.iam-role }}
          bucket-name: ${{ inputs.bucket-name }}
          storage-prefix: ${{ inputs.storage-prefix }}
          file-path: test-artifact.txt
          s3-key: test-artifact-${{ github.run_id }}.txt
